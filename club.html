<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APEX Sports Club — Train Hard. Play Strong.</title>
  <meta name="description" content="Elite multi-sport academy offering cricket, football and tennis coaching with world-class facilities and certified coaches."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="home">

  <header class="header">
    <div class="container nav">
      <a class="brand" href="club.html">
        <span class="brand-mark" data-brand-mark>A</span>
        <span class="brand-text">
          <span class="brand-name" data-brand-name></span>
          <span class="brand-tag"  data-brand-tag></span>
        </span>
      </a>
      <ul class="nav-links" data-nav-links></ul>
      <button class="menu-toggle" data-menu-toggle aria-label="Menu">☰</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"><img data-hero-img alt="Sports training"/></div>
    <div class="container hero-content">
      <span class="eyebrow" data-hero-eyebrow></span>
      <h1 class="hero-title" data-hero-title></h1>
      <p class="hero-sub" data-hero-sub></p>
      <div class="hero-actions">
        <a data-btn-join></a>
        <a data-btn-explore></a>
      </div>
    </div>
    <div class="hero-scroll">Scroll</div>
  </section>

  <!-- STATS -->
  <section class="stats">
    <div class="container">
      <div class="stats-grid" data-stats></div>
    </div>
  </section>

  <!-- INTRO -->
  <section class="section">
    <div class="container intro-grid">
      <div class="intro-text">
        <span class="eyebrow" data-intro-eyebrow></span>
        <h2 data-intro-title></h2>
        <p data-intro-text></p>
        <a data-btn-learn></a>
      </div>
      <div class="intro-img"><img data-intro-img alt="Athletes training"/></div>
    </div>
  </section>

  <!-- SPORTS PREVIEW -->
  <section class="section section-light">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow">DISCIPLINES</span>
        <h2 data-sports-title></h2>
        <p data-sports-subtitle></p>
      </div>
      <div class="sports-grid" data-sports-grid></div>
    </div>
  </section>

  <!-- CTA BANNER -->
  <section class="cta-banner">
    <img data-cta-img alt=""/>
    <div class="container">
      <h2 data-cta-title></h2>
      <p data-cta-sub></p>
      <div class="hero-actions" style="justify-content:center">
        <a data-btn-cta-join></a>
        <a data-btn-cta-contact></a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <a class="brand" href="club.html">
            <span class="brand-mark" data-footer-mark>A</span>
            <span class="brand-text">
              <span class="brand-name" data-footer-brand></span>
              <span class="brand-tag"  data-footer-tag></span>
            </span>
          </a>
          <p data-footer-tagline></p>
        </div>
        <div class="footer-col">
          <h4>Explore</h4>
          <ul data-footer-explore></ul>
        </div>
        <div class="footer-col">
          <h4>Contact</h4>
          <ul data-footer-contact></ul>
        </div>
      </div>
      <div class="footer-bottom" data-footer-rights></div>
    </div>
  </footer>

  <script src="config/buttons.js"></script>
  <script src="config/text.js"></script>
  <script src="config/messages.js"></script>
  <script src="config/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
