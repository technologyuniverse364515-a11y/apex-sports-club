<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports — APEX Sports Club</title>
  <meta name="description" content="Cricket, football and tennis programs for every age and skill level."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="sports">

  <header class="header">
    <div class="container nav">
      <a class="brand" href="club.html">
        <span class="brand-mark" data-brand-mark>A</span>
        <span class="brand-text">
          <span class="brand-name" data-brand-name></span>
          <span class="brand-tag"  data-brand-tag></span>
        </span>
      </a>
      <ul class="nav-links" data-nav-links></ul>
      <button class="menu-toggle" data-menu-toggle aria-label="Menu">☰</button>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow" data-page-subtitle></span>
      <h1 data-page-title></h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow" data-sports-eyebrow></span>
        <h2 data-sports-title></h2>
        <p data-sports-subtitle></p>
      </div>
      <div class="sports-grid" data-sports-grid></div>
    </div>
  </section>

  <section class="cta-banner">
    <img data-cta-img alt=""/>
    <div class="container">
      <h2 data-cta-title></h2>
      <p data-cta-sub></p>
      <div class="hero-actions" style="justify-content:center">
        <a data-btn-cta-join></a>
        <a data-btn-cta-contact></a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <a class="brand" href="club.html">
            <span class="brand-mark" data-footer-mark>A</span>
            <span class="brand-text">
              <span class="brand-name" data-footer-brand></span>
              <span class="brand-tag"  data-footer-tag></span>
            </span>
          </a>
          <p data-footer-tagline></p>
        </div>
        <div class="footer-col"><h4>Explore</h4><ul data-footer-explore></ul></div>
        <div class="footer-col"><h4>Contact</h4><ul data-footer-contact></ul></div>
      </div>
      <div class="footer-bottom" data-footer-rights></div>
    </div>
  </footer>

  <script src="config/buttons.js"></script>
  <script src="config/text.js"></script>
  <script src="config/messages.js"></script>
  <script src="config/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
