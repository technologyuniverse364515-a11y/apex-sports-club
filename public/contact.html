<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — APEX Sports Club</title>
  <meta name="description" content="Visit, call or message APEX Sports Club. Trial sessions available."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="contact">

  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-mark" data-brand-mark>A</span>
        <span class="brand-text">
          <span class="brand-name" data-brand-name></span>
          <span class="brand-tag"  data-brand-tag></span>
        </span>
      </a>
      <ul class="nav-links" data-nav-links></ul>
      <button class="menu-toggle" data-menu-toggle aria-label="Menu">☰</button>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow" data-page-subtitle></span>
      <h1 data-page-title></h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head" style="margin-bottom:50px">
        <span class="eyebrow" data-contact-eyebrow></span>
        <h2 data-contact-title></h2>
        <p data-contact-subtitle></p>
      </div>

      <div class="contact-grid">
        <aside class="contact-info">
          <h3 data-info-title></h3>
          <div class="info-item">
            <div class="info-icon">📍</div>
            <div class="info-text"><strong>Address</strong><span data-info-address></span></div>
          </div>
          <div class="info-item">
            <div class="info-icon">📞</div>
            <div class="info-text"><strong>Phone</strong><span data-info-phone></span></div>
          </div>
          <div class="info-item">
            <div class="info-icon">✉</div>
            <div class="info-text"><strong>Email</strong><span data-info-email></span></div>
          </div>
          <div class="info-item">
            <div class="info-icon">⏱</div>
            <div class="info-text"><strong>Hours</strong><span data-info-hours></span></div>
          </div>
        </aside>

        <form class="contact-form" data-contact-form novalidate>
          <div class="form-row">
            <div class="form-group">
              <label data-label-name for="name"></label>
              <input id="name" name="name" type="text" required/>
            </div>
            <div class="form-group">
              <label data-label-email for="email"></label>
              <input id="email" name="email" type="email" required/>
            </div>
          </div>
          <div class="form-group">
            <label data-label-phone for="phone"></label>
            <input id="phone" name="phone" type="tel"/>
          </div>
          <div class="form-group">
            <label data-label-message for="message"></label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" data-form-submit>Send</button>
          <div class="form-msg" data-form-msg></div>
        </form>
      </div>

      <div class="map-wrap">
        <iframe
          src="https://www.google.com/maps?q=Gurugram%20Sector%2021&output=embed"
          loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Map"></iframe>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <a class="brand" href="index.html">
            <span class="brand-mark" data-footer-mark>A</span>
            <span class="brand-text">
              <span class="brand-name" data-footer-brand></span>
              <span class="brand-tag"  data-footer-tag></span>
            </span>
          </a>
          <p data-footer-tagline></p>
        </div>
        <div class="footer-col"><h4>Explore</h4><ul data-footer-explore></ul></div>
        <div class="footer-col"><h4>Contact</h4><ul data-footer-contact></ul></div>
      </div>
      <div class="footer-bottom" data-footer-rights></div>
    </div>
  </footer>

  <script src="config/buttons.js"></script>
  <script src="config/text.js"></script>
  <script src="config/messages.js"></script>
  <script src="config/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
